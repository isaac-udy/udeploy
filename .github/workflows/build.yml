name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # macOS arm64 — runs on the M-series GitHub-hosted runner.
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@v3
      - name: Build launcher
        run: ./gradlew :launcher:packageMacosArm64App
      - uses: actions/upload-artifact@v4
        with:
          name: udeploy-launcher-macos-arm64
          path: launcher/build/packagedApp/macosArm64/udeploy-launcher.app
          if-no-files-found: error

  # macOS x64 — runs on the Intel macOS runner.
  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@v3
      - name: Build launcher
        run: ./gradlew :launcher:linkReleaseExecutableMacosX64
      - uses: actions/upload-artifact@v4
        with:
          name: udeploy-launcher-macos-x64
          path: launcher/build/bin/macosX64/releaseExecutable/udeploy-launcher.kexe
          if-no-files-found: error

  # Linux + Windows builds both run on a single Ubuntu host. The
  # native Linux build uses g++ + GTK/WebKit2GTK dev packages; the
  # Windows .exe is cross-compiled via mingw-w64 (which is just
  # `apt install mingw-w64`). Cleaner than juggling a separate
  # Windows runner with msys2 path setup.
  build-linux-and-windows:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential \
            mingw-w64 \
            unzip
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@v3

      - name: Build Linux launcher
        run: ./gradlew :launcher:linkReleaseExecutableLinuxX64
      - uses: actions/upload-artifact@v4
        with:
          name: udeploy-launcher-linux-x64
          path: launcher/build/bin/linuxX64/releaseExecutable/udeploy-launcher.kexe
          if-no-files-found: error

      - name: Build Windows launcher (mingw cross-compile)
        run: ./gradlew :launcher:linkReleaseExecutableMingwX64
      - uses: actions/upload-artifact@v4
        with:
          name: udeploy-launcher-mingw-x64
          path: launcher/build/bin/mingwX64/releaseExecutable/udeploy-launcher.exe
          if-no-files-found: error
